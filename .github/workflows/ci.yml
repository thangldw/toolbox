name: CI

on:
  push:
    branches: [main]
    paths:
      - "apps/diskora/**"
      - ".github/workflows/ci.yml"
  pull_request:
    paths:
      - "apps/diskora/**"
      - ".github/workflows/ci.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  diskora:
    name: Diskora
    runs-on: macos-14
    defaults:
      run:
        working-directory: apps/diskora
    steps:
      - uses: actions/checkout@v4
      - name: Show Swift version
        run: swift --version
      - name: Lint
        run: swift format lint --recursive --parallel Sources Tests Package.swift
      - name: Test core services
        run: ./scripts/test_core.sh
      - name: Build debug app
        run: swift build
