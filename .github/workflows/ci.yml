name: CI

on:
  pull_request:
    paths:
      - "apps/diskora/**"
      - ".github/workflows/ci.yml"
  workflow_dispatch:

concurrency:
  group: diskora-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  diskora:
    name: Diskora
    runs-on: macos-15
    timeout-minutes: 15
    defaults:
      run:
        working-directory: apps/diskora
    steps:
      - uses: actions/checkout@v6
      - name: Show Swift version
        run: swift --version
      - name: Lint
        run: swift format lint --recursive --parallel Sources Tests Package.swift
      - name: Test core services
        run: ./scripts/test_core.sh
      - name: Build debug app
        run: swift build
