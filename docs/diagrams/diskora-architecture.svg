<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="820" viewBox="0 0 1440 820" role="img" aria-labelledby="title desc">
  <title id="title">Diskora architecture</title>
  <desc id="desc">Luồng từ người dùng qua SwiftUI, ViewModel, services, safety gate đến filesystem, Vision, Trash và lịch sử.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%"><feDropShadow dx="0" dy="5" stdDeviation="7" flood-opacity=".14"/></filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M0 0L10 5L0 10Z" fill="#5f6470"/></marker>
    <style>
      .canvas{fill:#fbfaf7}.title{font:700 34px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#202124}.subtitle{font:500 17px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#676b75}.node-title{font:700 19px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#202124}.node-body{font:500 14px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#4f535d}.note{font:600 15px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#5e4b16}.connector{fill:none;stroke:#5f6470;stroke-width:3;stroke-linecap:round;marker-end:url(#arrow)}.dashed{stroke-dasharray:8 8}.card{stroke:#202124;stroke-width:2;rx:18;filter:url(#shadow)}
    </style>
  </defs>
  <rect class="canvas" width="1440" height="820"/>
  <path d="M80 86C230 28 394 45 526 74" fill="none" stroke="#ffd02f" stroke-width="14" stroke-linecap="round" opacity=".8"/>
  <text class="title" x="80" y="92">Diskora — Architecture map</text>
  <text class="subtitle" x="80" y="124">See where your space goes. • MVVM nhẹ • local-first • safety-first</text>

  <path class="connector" d="M266 303C320 303 330 303 376 303"/>
  <path class="connector" d="M596 303C646 303 658 303 704 303"/>
  <path class="connector" d="M924 303C976 303 987 303 1032 303"/>
  <path class="connector" d="M1142 372C1142 424 1076 432 1076 480"/>
  <path class="connector" d="M1152 372C1152 424 1260 426 1260 480"/>
  <path class="connector" d="M814 372C814 458 716 463 716 538"/>
  <path class="connector" d="M824 372C824 445 920 452 920 538"/>
  <path class="connector dashed" d="M486 372C486 566 555 601 598 642"/>

  <g transform="rotate(-1 168 303)"><rect class="card" x="70" y="235" width="196" height="136" fill="#fff3a6"/><text class="node-title" x="94" y="278">Người dùng</text><text class="node-body" x="94" y="311"><tspan x="94">Chọn phạm vi</tspan><tspan x="94" dy="22">Xem trước</tspan><tspan x="94" dy="22">Xác nhận hành động</tspan></text></g>
  <g transform="rotate(1 486 303)"><rect class="card" x="376" y="235" width="220" height="136" fill="#cfe8ff"/><text class="node-title" x="400" y="278">SwiftUI Views</text><text class="node-body" x="400" y="311"><tspan x="400">Feature screens</tspan><tspan x="400" dy="22">Shared components</tspan><tspan x="400" dy="22">Không filesystem I/O</tspan></text></g>
  <g transform="rotate(-1 814 303)"><rect class="card" x="704" y="235" width="220" height="136" fill="#dfd3ff"/><text class="node-title" x="728" y="278">View Models</text><text class="node-body" x="728" y="311"><tspan x="728">UI state</tspan><tspan x="728" dy="22">Background tasks</tspan><tspan x="728" dy="22">Điều phối services</tspan></text></g>
  <g transform="rotate(1 1142 303)"><rect class="card" x="1032" y="235" width="220" height="136" fill="#c9f3dc"/><text class="node-title" x="1056" y="278">Services</text><text class="node-body" x="1056" y="311"><tspan x="1056">Scanner engines</tspan><tspan x="1056" dy="22">Cleanup actions</tspan><tspan x="1056" dy="22">Không phụ thuộc SwiftUI</tspan></text></g>

  <g><rect class="card" x="1000" y="480" width="152" height="112" fill="#ffd6d2"/><text class="node-title" x="1022" y="518">Safety gate</text><text class="node-body" x="1022" y="548"><tspan x="1022">Normalize path</tspan><tspan x="1022" dy="21">Risk + confirm</tspan></text></g>
  <g><rect class="card" x="1184" y="480" width="152" height="112" fill="#ffdfb4"/><text class="node-title" x="1206" y="518">File system</text><text class="node-body" x="1206" y="548"><tspan x="1206">Read metadata</tspan><tspan x="1206" dy="21">Move to Trash</tspan></text></g>
  <g><rect class="card" x="630" y="538" width="172" height="112" fill="#d8f0ff"/><text class="node-title" x="652" y="576">Apple Vision</text><text class="node-body" x="652" y="606"><tspan x="652">Feature prints</tspan><tspan x="652" dy="21">Similar photos</tspan></text></g>
  <g><rect class="card" x="834" y="538" width="172" height="112" fill="#e5f5c7"/><text class="node-title" x="856" y="576">Analysis</text><text class="node-body" x="856" y="606"><tspan x="856">Size • SHA-256</tspan><tspan x="856" dy="21">Trends • runtimes</tspan></text></g>
  <g transform="rotate(-2 660 696)"><rect x="580" y="642" width="244" height="108" rx="4" fill="#fff3a6" filter="url(#shadow)"/><text class="note" x="604" y="680"><tspan x="604">History &amp; reports</tspan><tspan x="604" dy="24">~/Library/Application Support/Diskora</tspan><tspan x="604" dy="24">Local only • no telemetry</tspan></text></g>

  <path d="M1096 689c52 30 110 28 154-4" fill="none" stroke="#8b5cf6" stroke-width="6" stroke-linecap="round"/>
  <text class="note" x="1050" y="734">Trash = recoverable by default ↗</text>
</svg>
